name: 添加友链

on:
    issue_comment:
        types: [created]

permissions:
    contents: write
    issues: write

jobs:
    add-friend:
        # 仅在已关闭的 issue 上、且评论包含 "已添加友链" 时触发
        if: >
            github.event.issue.state == 'closed' &&
            contains(github.event.comment.body, '已添加友链')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            # 把 issue body 和 labels 写入临时文件，避免 shell 特殊字符问题
            - name: Extract issue data
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      fs.writeFileSync('/tmp/issue_body.txt', context.payload.issue.body);
                      const labels = context.payload.issue.labels.map(l => l.name);
                      fs.writeFileSync('/tmp/issue_labels.json', JSON.stringify(labels));
                      core.info(`Labels: ${labels.join(', ')}`);

            - name: Run add-friend script
              id: run
              run: node scripts/add-friend.mjs

            - name: Comment - 添加成功
              if: success()
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: '✅ 友链已成功添加'
                      });

            - name: Comment - 添加失败
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: '❌ 友链添加失败，请检查 issue 格式是否正确'
                      });

            - name: Commit and push
              if: success()
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add src/data/friends.json
                  git commit -m "chore: 添加友链 #${{ github.event.issue.number }}"
                  git push
